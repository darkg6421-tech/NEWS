<!DOCTYPE html>
<html>
<head>
  <title>News App</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 10px;
    }

    h1 {
      text-align: center;
    }

    #news {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card h3 {
      font-size: 16px;
    }
  </style>

</head>
<body>

<h1>Latest News</h1>

<button onclick="fetchNews()">🔄 Refresh</button>
<p id="last"></p>

<div id="news">Loading...</div>

<script src="script.js"></script>

</body>
</html>
