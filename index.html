<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="NewsHub Premium - AI-Powered Smart News with Summaries">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NewsHub">

  <title>NewsHub Premium • Smart News</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      transition: var(--transition);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-blue);
      border-radius: 10px;
    }

    /* Breaking Ticker */
    .breaking-ticker {
      background: linear-gradient(90deg, var(--accent-red), #b91c1c);
      color: white;
      padding: 8px 0;
      overflow: hidden;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .ticker-content {
      display: inline-block;
      animation: ticker 30s linear infinite;
      padding-left: 100%;
      white-space: nowrap;
    }
    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Top Bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(59, 130, 246, 0.2);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .logo-gradient {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .premium-badge {
      background: linear-gradient(135deg, var(--accent-yellow), #f97316);
      color: #000;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 0.65rem;
      font-weight: 700;
    }

    /* Menu */
    #menu {
      position: fixed;
      top: 0;
      left: -300px;
      width: 300px;
      height: 100vh;
      background: var(--bg-secondary);
      padding: 20px;
      transition: 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 1000;
      box-shadow: 4px 0 25px rgba(0,0,0,0.4);
    }
    #menu.open { left: 0; }

    /* Search & Categories */
    .search-container {
      padding: 20px 15px 10px;
    }
    #search {
      width: 100%;
      padding: 14px 20px;
      border-radius: 50px;
      border: 2px solid transparent;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 1rem;
    }
    #search:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .categories {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px 15px;
    }
    .category-btn {
      padding: 9px 20px;
      border-radius: 50px;
      border: none;
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.9rem;
      transition: var(--transition);
    }
    .category-btn.active,
    .category-btn:hover {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      transform: translateY(-2px);
    }

    /* News Grid */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 22px;
      padding: 15px;
    }

    .card {
      background: var(--bg-secondary);
      border-radius: 18px;
      overflow: hidden;
      transition: var(--transition);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .card-img {
      position: relative;
      height: 190px;
      overflow: hidden;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .card:hover .card-img img {
      transform: scale(1.08);
    }

    .reading-time {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.75);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .card-content {
      padding: 16px;
    }

    .summary-section {
      background: rgba(59,130,246,0.08);
      border-left: 4px solid var(--accent-blue);
      padding: 12px;
      border-radius: 10px;
      margin: 12px 0;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .action-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      cursor: pointer;
      font-weight: 500;
      transition: var(--transition);
    }
    .action-btn:hover {
      background: var(--accent-blue);
      color: white;
    }
    .save-btn.saved {
      background: var(--accent-green);
      color: white;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      z-index: 2000;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(30px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    /* Premium Popup */
    .premium-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 30px;
      z-index: 3000;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      border: 2px solid var(--accent-yellow);
    }

    footer {
      text-align: center;
      padding: 30px 15px;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <!-- Breaking Ticker -->
  <div class="breaking-ticker" id="breakingTicker">
    <div class="ticker-content" id="tickerContent"></div>
  </div>

  <!-- Top Bar -->
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:12px;">
      <button class="menu-btn" onclick="toggleMenu()" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-primary);">☰</button>
      <div class="logo">
        <span class="logo-gradient">NewsHub</span>
        <span class="premium-badge">PREMIUM</span>
      </div>
    </div>
    <button onclick="toggleTheme()" style="background:none;border:none;font-size:24px;cursor:pointer;">🌓</button>
  </div>

  <!-- Side Menu -->
  <div id="menu">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;">
      <h2>Menu</h2>
      <button onclick="toggleMenu()" style="background:none;border:none;font-size:28px;cursor:pointer;">✕</button>
    </div>
    <div class="menu-item" onclick="showSection('home')">🏠 Home</div>
    <div class="menu-item" onclick="showSection('saved')">⭐ Saved</div>
    <div class="menu-item" onclick="showSection('trending')">🔥 Trending</div>
    <div class="menu-item" onclick="showSection('premium')">💎 Premium</div>
    <div class="menu-item" onclick="showPremiumInquiry()">📧 Contact Premium</div>
  </div>

  <!-- Main Sections -->
  <div id="homeSection">
    <div class="search-container">
      <input type="text" id="search" placeholder="Search news..." oninput="debouncedSearch()">
    </div>

    <div class="categories">
      <button class="category-btn active" onclick="setCategory('all')">All</button>
      <button class="category-btn" onclick="setCategory('india')">🇮🇳 India</button>
      <button class="category-btn" onclick="setCategory('world')">🌍 World</button>
      <button class="category-btn" onclick="setCategory('technology')">💻 Tech</button>
      <button class="category-btn" onclick="setCategory('sports')">⚽ Sports</button>
    </div>

    <button onclick="fetchNews()" style="display:block;margin:15px auto;padding:12px 32px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));border:none;border-radius:50px;color:white;cursor:pointer;font-weight:600;">🔄 Refresh News</button>

    <p id="last" style="text-align:center;font-size:0.75rem;opacity:0.7;margin:10px 0;"></p>
    <div id="news" class="news-grid"></div>
  </div>

  <div id="savedSection" style="display:none;">
    <h2 style="text-align:center;margin:30px 0 20px;">⭐ Saved Articles</h2>
    <div id="saved" class="news-grid"></div>
  </div>

  <div id="trendingSection" style="display:none;">
    <h2 style="text-align:center;margin:30px 0 20px;">🔥 Trending Now</h2>
    <div id="trending" class="news-grid"></div>
  </div>

  <div id="premiumSection" style="display:none;">
    <h2 style="text-align:center;margin:30px 0 20px;">💎 Premium Exclusive</h2>
    <div id="premium" class="news-grid"></div>
  </div>

  <footer>
    <p>© 2026 NewsHub Premium • Made with ❤️</p>
    <p>Contact: <a href="mailto:darkg6421@gmail.com" style="color:var(--accent-blue);">darkg6421@gmail.com</a></p>
  </footer>

  <script src="script.js?v=6"></script>
</body>
</html>
