<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Premium NewsHub - Latest news with AI summaries">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NewsHub">
  
  <title>NewsHub Premium - Smart News</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
      --transition: all 0.3s ease;
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: var(--transition);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-blue);
      border-radius: 10px;
    }

    /* Breaking Ticker */
    .breaking-ticker {
      background: linear-gradient(90deg, var(--accent-red), #dc2626);
      color: white;
      padding: 6px 0;
      overflow: hidden;
      white-space: nowrap;
      font-size: 0.8rem;
    }
    .ticker-content {
      display: inline-block;
      animation: ticker 25s linear infinite;
      padding-left: 100%;
    }
    .ticker-item {
      display: inline-block;
      margin-right: 35px;
    }
    .ticker-badge {
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 20px;
      margin-right: 8px;
      font-size: 0.7rem;
    }
    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Top Bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid rgba(59,130,246,0.2);
    }
    [data-theme="light"] .topbar {
      background: rgba(255, 255, 255, 0.95);
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .menu-btn, .theme-toggle {
      background: var(--bg-tertiary);
      border: none;
      font-size: 20px;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
    }
    .menu-btn:hover, .theme-toggle:hover {
      background: var(--accent-blue);
      color: white;
    }
    .logo h1 {
      font-size: 1.4rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .premium-badge {
      background: linear-gradient(135deg, var(--accent-yellow), #f97316);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.6rem;
      font-weight: bold;
      color: #000;
      margin-left: 6px;
    }

    /* Side Menu */
    #menu {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: var(--bg-secondary);
      padding: 20px;
      transition: 0.3s;
      z-index: 1000;
      box-shadow: 2px 0 20px rgba(0,0,0,0.3);
      overflow-y: auto;
    }
    #menu.open {
      left: 0;
    }
    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--accent-blue);
    }
    .close-menu {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .menu-item {
      padding: 12px 15px;
      margin: 5px 0;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .menu-item:hover {
      background: var(--bg-tertiary);
      transform: translateX(5px);
    }

    /* Search */
    .search-container {
      max-width: 500px;
      margin: 20px auto;
      padding: 0 15px;
    }
    #search {
      width: 100%;
      padding: 12px 20px;
      border-radius: 50px;
      border: 2px solid transparent;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: var(--transition);
    }
    #search:focus {
      outline: none;
      border-color: var(--accent-blue);
    }

    /* Categories */
    .categories {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 15px 0;
      padding: 0 15px;
    }
    .category-btn {
      padding: 8px 18px;
      border-radius: 50px;
      border: none;
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.85rem;
    }
    .category-btn.active {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
    }
    .category-btn:hover {
      transform: translateY(-2px);
      background: var(--accent-blue);
      color: white;
    }

    /* Refresh */
    .refresh-btn {
      display: block;
      margin: 15px auto;
      padding: 10px 28px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      font-weight: 500;
    }

    /* News Grid */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    /* Card */
    .card {
      background: var(--bg-secondary);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .card-img {
      position: relative;
      height: 170px;
      overflow: hidden;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .reading-time {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      padding: 2px 8px;
      border-radius: 15px;
      font-size: 0.65rem;
    }
    .card-content {
      padding: 15px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 5px;
    }
    .source {
      background: var(--bg-tertiary);
      padding: 2px 10px;
      border-radius: 15px;
      font-size: 0.65rem;
      font-weight: 600;
    }
    .trending-badge {
      color: var(--accent-red);
      font-size: 0.7rem;
      font-weight: bold;
    }
    .card h3 {
      font-size: 1rem;
      margin: 10px 0;
      line-height: 1.4;
    }
    .card h3 a {
      color: var(--text-primary);
      text-decoration: none;
    }
    .card h3 a:hover {
      color: var(--accent-blue);
    }

    /* Summary */
    .summary-section {
      margin: 10px 0;
      padding: 8px 10px;
      background: rgba(59,130,246,0.08);
      border-radius: 10px;
      border-left: 3px solid var(--accent-blue);
    }
    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent-blue);
    }
    .summary-text {
      font-size: 0.78rem;
      line-height: 1.4;
      color: var(--text-secondary);
    }
    .regenerate-summary {
      background: none;
      border: none;
      color: var(--accent-blue);
      cursor: pointer;
      font-size: 0.7rem;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 10px;
      margin: 10px 0 8px;
    }
    .action-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .action-btn:hover {
      background: var(--accent-blue);
      color: white;
    }
    .save-btn.saved {
      background: var(--accent-green);
      color: white;
    }
    .date {
      font-size: 0.6rem;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    /* Skeleton */
    .skeleton-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      overflow: hidden;
    }
    .skeleton-img {
      height: 170px;
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-content {
      padding: 15px;
    }
    .skeleton-line {
      height: 14px;
      background: var(--bg-tertiary);
      margin: 8px 0;
      border-radius: 8px;
    }
    .skeleton-line.short {
      width: 60%;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      z-index: 2000;
      animation: slideUp 0.3s ease;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    /* Premium Popup */
    .premium-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 25px;
      z-index: 2000;
      max-width: 350px;
      text-align: center;
      border: 2px solid var(--accent-yellow);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .premium-popup .close {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }
    .premium-popup input {
      width: 100%;
      padding: 10px;
      margin: 15px 0;
      border-radius: 10px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .premium-btn {
      background: linear-gradient(135deg, var(--accent-yellow), #f97316);
      color: #000;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      background: var(--bg-secondary);
      font-size: 0.75rem;
    }
    footer a {
      color: var(--accent-blue);
      text-decoration: none;
      margin: 0 8px;
    }

    @media (max-width: 768px) {
      .news-grid {
        grid-template-columns: 1fr;
        padding: 15px;
      }
      .toast {
        white-space: normal;
        max-width: 90%;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="breaking-ticker" id="breakingTicker">
    <div class="ticker-content" id="tickerContent">
      <span class="ticker-item"><span class="ticker-badge">🔴 LIVE</span> Loading news...</span>
    </div>
  </div>

  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <div class="logo">
        <h1>NewsHub</h1>
        <span class="premium-badge">PREMIUM</span>
      </div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>

  <div id="menu">
    <div class="menu-header">
      <h2>Menu</h2>
      <button class="close-menu" onclick="toggleMenu()">✕</button>
    </div>
    <div class="menu-item" onclick="showSection('home')">🏠 Home</div>
    <div class="menu-item" onclick="showSection('saved')">⭐ Saved</div>
    <div class="menu-item" onclick="showSection('trending')">🔥 Trending</div>
    <div class="menu-item" onclick="showSection('premium')">💎 Premium</div>
    <div class="menu-item" onclick="showPremiumInquiry()">📧 Premium Inquiry</div>
  </div>

  <div id="homeSection">
    <div class="search-container">
      <input type="text" id="search" placeholder="🔍 Search news..." oninput="debouncedSearch()">
    </div>
    <div class="categories">
      <button class="category-btn active" onclick="setCategory('all')">All</button>
      <button class="category-btn" onclick="setCategory('india')">🇮🇳 India</button>
      <button class="category-btn" onclick="setCategory('world')">🌍 World</button>
      <button class="category-btn" onclick="setCategory('technology')">💻 Tech</button>
      <button class="category-btn" onclick="setCategory('sports')">⚽ Sports</button>
    </div>
    <button class="refresh-btn" onclick="fetchNews()">🔄 Refresh</button>
    <p id="last" style="text-align: center; font-size: 0.7rem; opacity: 0.6;"></p>
    <div id="news" class="news-grid"></div>
  </div>

  <div id="savedSection" style="display:none;">
    <h2 style="text-align: center; margin: 30px 0;">⭐ Saved News</h2>
    <div id="saved" class="news-grid"></div>
  </div>

  <div id="trendingSection" style="display:none;">
    <h2 style="text-align: center; margin: 30px 0;">🔥 Trending Now</h2>
    <div id="trending" class="news-grid"></div>
  </div>

  <div id="premiumSection" style="display:none;">
    <h2 style="text-align: center; margin: 30px 0;">💎 Premium Exclusive</h2>
    <div id="premium" class="news-grid"></div>
  </div>

  <footer>
    <hr style="border-color: var(--bg-tertiary); margin-bottom: 15px;">
    <p>
      <a href="#" onclick="showPremiumInquiry()">📧 Premium</a> |
      <a href="#" onclick="showNewsletterPopup()">📧 Newsletter</a> |
      <a href="privacy.html">Privacy</a>
    </p>
    <p>© 2024 NewsHub Premium | Contact: darkg6421@gmail.com</p>
  </footer>

  <script src="script.js?v=5"></script>
</body>
</html>
