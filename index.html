<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Premium NewsHub - Latest news with AI summaries, trending stories, and real-time updates">
  <meta name="keywords" content="news, premium news, AI news summary, trending news, india news, world news">
  <meta name="author" content="NewsHub Premium">
  
  <title>NewsHub Premium - Smart News with AI Summary</title>
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NewsHub Premium">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: var(--transition);
      overflow-x: hidden;
    }

    /* Modern Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 10px;
    }

    /* Breaking News Ticker */
    .breaking-ticker {
      background: linear-gradient(90deg, var(--accent-red), #dc2626);
      color: white;
      padding: 8px 0;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      z-index: 99;
      font-size: 0.85rem;
    }

    .ticker-content {
      display: inline-block;
      animation: ticker 30s linear infinite;
      padding-left: 100%;
    }

    .ticker-item {
      display: inline-block;
      margin-right: 40px;
    }

    .ticker-badge {
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 20px;
      margin-right: 10px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Top Bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      box-shadow: var(--shadow-md);
      border-bottom: 1px solid rgba(59,130,246,0.2);
    }

    [data-theme="light"] .topbar {
      background: rgba(255, 255, 255, 0.95);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .menu-btn, .theme-toggle {
      background: var(--bg-tertiary);
      border: none;
      font-size: 22px;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      color: var(--accent-blue);
    }

    .menu-btn:hover, .theme-toggle:hover {
      transform: scale(1.05);
      background: var(--accent-blue);
      color: white;
    }

    .logo h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .premium-badge {
      background: linear-gradient(135deg, var(--accent-yellow), #f97316);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: bold;
      color: #000;
      margin-left: 8px;
    }

    /* Side Menu */
    #menu {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: var(--bg-secondary);
      backdrop-filter: blur(20px);
      padding: 20px;
      transition: var(--transition);
      z-index: 1000;
      box-shadow: var(--shadow-xl);
      overflow-y: auto;
    }

    #menu.open {
      left: 0;
    }

    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--accent-blue);
    }

    .close-menu {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .menu-item {
      padding: 12px 15px;
      margin: 5px 0;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-item:hover {
      background: var(--bg-tertiary);
      transform: translateX(5px);
    }

    /* Search Bar */
    .search-container {
      max-width: 500px;
      margin: 20px auto;
      padding: 0 15px;
      position: relative;
    }

    #search {
      width: 100%;
      padding: 12px 20px;
      border-radius: 50px;
      border: 2px solid transparent;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    #search:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    /* Category Buttons */
    .categories {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 15px 0;
      padding: 0 15px;
    }

    .category-btn {
      padding: 8px 18px;
      border-radius: 50px;
      border: none;
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
      font-size: 0.85rem;
    }

    .category-btn.active {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
    }

    .category-btn:hover {
      transform: translateY(-2px);
      background: var(--accent-blue);
      color: white;
    }

    /* Refresh Button */
    .refresh-btn {
      display: block;
      margin: 15px auto;
      padding: 10px 28px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      font-weight: 500;
      transition: var(--transition);
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* News Grid */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    /* Card Styles */
    .card {
      background: var(--bg-secondary);
      border-radius: 16px;
      overflow: hidden;
      transition: var(--transition);
      animation: fadeInUp 0.4s ease;
      box-shadow: var(--shadow-sm);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .card-img {
      position: relative;
      height: 180px;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .card:hover .card-img img {
      transform: scale(1.05);
    }

    .reading-time {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      padding: 2px 8px;
      border-radius: 15px;
      font-size: 0.65rem;
      color: white;
    }

    .card-content {
      padding: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .source {
      display: inline-block;
      padding: 2px 10px;
      background: var(--bg-tertiary);
      border-radius: 15px;
      font-size: 0.65rem;
      font-weight: 600;
    }

    .trending-badge {
      color: var(--accent-red);
      font-size: 0.7rem;
      font-weight: bold;
    }

    .card h3 {
      font-size: 1rem;
      margin: 10px 0;
      line-height: 1.4;
    }

    .card h3 a {
      color: var(--text-primary);
      text-decoration: none;
    }

    .card h3 a:hover {
      color: var(--accent-blue);
    }

    /* Summary Section - CLEAN VERSION */
    .summary-section {
      margin: 12px 0;
      padding: 10px 12px;
      background: rgba(59,130,246,0.08);
      border-radius: 10px;
      border-left: 3px solid var(--accent-blue);
    }

    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent-blue);
    }

    .summary-text {
      font-size: 0.8rem;
      line-height: 1.45;
      color: var(--text-secondary);
    }

    .regenerate-summary {
      background: none;
      border: none;
      color: var(--accent-blue);
      cursor: pointer;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .regenerate-summary:hover {
      background: var(--bg-tertiary);
    }

    /* Action Buttons - CLEAN & COMPACT */
    .action-buttons {
      display: flex;
      gap: 10px;
      margin: 12px 0 8px;
    }

    .action-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .action-btn:hover {
      background: var(--accent-blue);
      color: white;
      transform: translateY(-1px);
    }

    .save-btn.saved {
      background: var(--accent-green);
      color: white;
    }

    .date {
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    /* Skeleton Loading */
    .skeleton-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      overflow: hidden;
    }

    .skeleton-img {
      height: 180px;
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-content {
      padding: 16px;
    }

    .skeleton-line {
      height: 16px;
      background: var(--bg-tertiary);
      margin: 8px 0;
      border-radius: 8px;
    }

    .skeleton-line.short {
      width: 60%;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      z-index: 2000;
      animation: slideUp 0.3s ease;
      box-shadow: var(--shadow-lg);
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
    }

    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    /* Footer */
    footer {
      margin-top: 40px;
      padding: 25px 20px;
      text-align: center;
      background: var(--bg-secondary);
      border-top: 1px solid var(--bg-tertiary);
      font-size: 0.8rem;
    }

    footer a {
      color: var(--accent-blue);
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Newsletter Popup */
    .newsletter-popup {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow-xl);
      z-index: 1000;
      max-width: 280px;
      border: 1px solid var(--accent-blue);
    }

    .newsletter-popup h4 {
      margin-bottom: 8px;
      color: var(--accent-blue);
    }

    .newsletter-popup input {
      width: 100%;
      padding: 8px 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .close-popup {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .subscribe-btn {
      width: 100%;
      padding: 8px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .news-grid {
        grid-template-columns: 1fr;
        padding: 15px;
        gap: 16px;
      }
      
      .topbar {
        padding: 10px 15px;
      }
      
      .logo h1 {
        font-size: 1.2rem;
      }
      
      .category-btn {
        padding: 6px 14px;
        font-size: 0.75rem;
      }

      .action-buttons {
        gap: 8px;
      }
      
      .toast {
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }

    .keyboard-hint {
      position: fixed;
      bottom: 15px;
      left: 15px;
      background: var(--bg-secondary);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.6rem;
      opacity: 0.6;
      z-index: 99;
    }
  </style>
</head>

<body>
  <!-- Breaking News Ticker -->
  <div class="breaking-ticker" id="breakingTicker">
    <div class="ticker-content" id="tickerContent">
      <span class="ticker-item"><span class="ticker-badge">🔴 LIVE</span> Loading latest news...</span>
    </div>
  </div>

  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <div class="logo">
        <h1>NewsHub</h1>
        <span class="premium-badge">PREMIUM</span>
      </div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>

  <div id="menu">
    <div class="menu-header">
      <h2>Menu</h2>
      <button class="close-menu" onclick="toggleMenu()">✕</button>
    </div>
    <div class="menu-item" onclick="showSection('home')">
      <span>🏠</span> Home
    </div>
    <div class="menu-item" onclick="showSection('saved')">
      <span>⭐</span> Saved News
    </div>
    <div class="menu-item" onclick="showSection('trending')">
      <span>🔥</span> Trending
    </div>
    <div class="menu-item" onclick="showSection('premium')">
      <span>💎</span> Premium
    </div>
  </div>

  <div id="homeSection">
    <div class="search-container">
      <input type="text" id="search" placeholder="🔍 Search news..." oninput="debouncedSearch()">
    </div>

    <div class="categories">
      <button class="category-btn active" onclick="setCategory('all')">All</button>
      <button class="category-btn" onclick="setCategory('india')">🇮🇳 India</button>
      <button class="category-btn" onclick="setCategory('defence')">⚔️ Defence</button>
      <button class="category-btn" onclick="setCategory('world')">🌍 World</button>
      <button class="category-btn" onclick="setCategory('technology')">💻 Tech</button>
      <button class="category-btn" onclick="setCategory('sports')">⚽ Sports</button>
    </div>

    <button class="refresh-btn" onclick="fetchNews()">🔄 Refresh</button>
    <p id="last" style="text-align: center; font-size: 0.7rem; opacity: 0.6;"></p>

    <div id="news" class="news-grid"></div>
  </div>

  <div id="savedSection" style="display:none;">
    <h2 style="text-align: center; margin: 30px 0; font-size: 1.3rem;">⭐ Saved News</h2>
    <div id="saved" class="news-grid"></div>
  </div>

  <div id="trendingSection" style="display:none;">
    <h2 style="text-align: center; margin: 30px 0; font-size: 1.3rem;">🔥 Trending Now</h2>
    <div id="trending" class="news-grid"></div>
  </div>

  <div id="premiumSection" style="display:none;">
    <h2 style="text-align: center; margin: 30px 0; font-size: 1.3rem;">💎 Premium Exclusive</h2>
    <div id="premium" class="news-grid"></div>
  </div>

  <footer>
    <hr style="border-color: var(--bg-tertiary); margin-bottom: 15px;">
    <p>
      <a href="#" onclick="showNewsletterPopup()">📧 Newsletter</a> |
      <a href="privacy.html">Privacy</a> |
      <a href="about.html">About</a>
    </p>
    <p style="margin-top: 10px;">© 2024 NewsHub Premium</p>
  </footer>

  <div class="keyboard-hint">
    ⌨️ S: Search | D: Dark Mode
  </div>

  <script src="script.js?v=4"></script>
</body>
</html>
