<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <!-- SEO & Open Graph -->
  <meta name="description" content="NewsHub - AI-Powered News Platform | Breaking News, Personalized Feed, Offline Reading">
  <meta name="keywords" content="news, AI news, personalized news, breaking news, India news, world news">
  <meta name="author" content="NewsHub Enterprise">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph -->
  <meta property="og:title" content="NewsHub - AI News Platform">
  <meta property="og:description" content="Stay ahead with AI-curated news">
  <meta property="og:image" content="https://news-hub-enterprise.vercel.app/og-image.jpg">
  <meta property="og:url" content="https://yourusername.github.io/news-hub">
  <meta property="og:type" content="website">
  
  <!-- PWA v2.0 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NewsHub Pro">
  
  <title>NewsHub Pro - AI News Platform</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
  
  <style>
    /* [YOUR ORIGINAL CSS + ENHANCEMENTS] */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #1a1f2e;
      --bg-tertiary: #2a2f45;
      --glass-bg: rgba(255,255,255,0.05);
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-gold: #f59e0b;
      --shadow-glass: 0 8px 32px rgba(0,0,0,0.3);
      --shadow-neumorph: 8px 8px 16px rgba(0,0,0,0.3), -8px -8px 16px rgba(255,255,255,0.1);
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --glass-bg: rgba(0,0,0,0.05);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --shadow-glass: 0 8px 32px rgba(0,0,0,0.1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      33% { transform: translateY(-20px) rotate(120deg); }
      66% { transform: translateY(10px) rotate(240deg); }
    }

    /* Glassmorphism Components */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow-glass);
    }

    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, rgba(255,255,255,0.1) 50%, var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* [REST OF YOUR ORIGINAL CSS - ENHANCED] */
    /* ... (keeping all your existing styles + adding premium effects) ... */

    /* Premium Badge */
    .premium-badge {
      background: linear-gradient(135deg, var(--accent-gold), #f97316);
      color: #000;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Infinite Scroll Loader */
    .infinite-loader {
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    /* Voice Search Button */
    .voice-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent-gradient);
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      box-shadow: var(--shadow-glass);
      z-index: 1000;
      transition: var(--transition);
    }

    .voice-btn:hover {
      transform: scale(1.1) rotate(10deg);
    }

    .voice-btn.listening {
      background: var(--accent-red);
      animation: pulse 0.5s infinite;
    }

    /* Share Buttons */
    .share-buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .share-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: none;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .whatsapp { background: #25D366; color: white; }
    .telegram { background: #0088cc; color: white; }
    .twitter { background: #1DA1F2; color: white; }

    /* Responsive */
    @media (max-width: 768px) {
      .news-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
        padding: 12px;
      }
    }
  </style>
</head>

<body data-theme="dark">
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <!-- Your existing HTML structure with ENHANCEMENTS -->
  <div class="topbar glass">
    <div class="topbar-left">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <h1>NewsHub <span class="premium-badge">PRO</span></h1>
    </div>
    <div style="display: flex; gap: 10px;">
      <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
      <div id="notification-badge" style="background: var(--accent-red); width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 12px;">3</div>
    </div>
  </div>

  <!-- Voice Search Button -->
  <button class="voice-btn" onclick="startVoiceSearch()" id="voiceBtn">🎤</button>

  <!-- Your existing sections with skeleton loading states -->
  <div id="homeSection">
    <!-- Enhanced search with voice -->
    <div class="search-container glass" style="margin: 20px;">
      <div style="position: relative;">
        <input type="text" id="search" placeholder="🔍 Search news or say 'latest news'...">
        <button class="voice-btn" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px;" onclick="startVoiceSearch()">🎤</button>
      </div>
    </div>

    <!-- Your existing categories + trending -->
    <div class="categories">
      <button class="category-btn active" onclick="setCategory('all')">All</button>
      <button class="category-btn" onclick="setCategory('trending')">🔥 Trending</button>
      <!-- ... rest of categories ... -->
    </div>

    <div id="news" class="news-grid"></div>
    <div id="infiniteLoader" class="infinite-loader" style="display: none;">
      <div class="loader"></div>
    </div>
  </div>

  <!-- Your existing saved/premium sections -->

  <footer class="glass" style="margin-top: 60px;">
    <p>© 2024 NewsHub Enterprise | <span id="userCount">10K+</span> users | Powered by AI</p>
  </footer>

  <script src="script.js?v=3.0"></script>
</body>
</html>
