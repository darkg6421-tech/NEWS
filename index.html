<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Stay updated with latest news from India and around the world - NewsHub provides real-time news coverage">
  <meta name="keywords" content="news, latest news, india news, world news, breaking news, current affairs, news app">
  <meta name="author" content="NewsHub">
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  
  <title>NewsHub - Latest News | India & World News</title>
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NewsHub">
  
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="NewsHub - Latest News">
  <meta property="og:description" content="Stay updated with latest news from India and around the world">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_IN">
  
  <style>

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --accent-blue: #60a5fa;
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --accent-yellow: #fbbf24;
      --shadow: 0 8px 16px rgba(0,0,0,0.3);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: var(--transition);
      overflow-x: hidden;
    }

    /* Modern Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent-blue);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3b82f6;
    }

    /* Top Bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-secondary);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .menu-btn, .theme-toggle {
      background: var(--bg-tertiary);
      border: none;
      font-size: 24px;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: var(--transition);
      color: var(--accent-blue);
    }

    .menu-btn:hover, .theme-toggle:hover {
      transform: scale(1.05);
      background: var(--accent-blue);
      color: white;
    }

    h1, h2 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--accent-blue), #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
    }

    /* Side Menu */
    #menu {
      position: fixed;
      top: 0;
      left: -300px;
      width: 280px;
      height: 100%;
      background: var(--bg-secondary);
      backdrop-filter: blur(20px);
      padding: 20px;
      transition: var(--transition);
      z-index: 1000;
      box-shadow: 2px 0 20px rgba(0,0,0,0.3);
      overflow-y: auto;
    }

    #menu.open {
      left: 0;
    }

    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--accent-blue);
    }

    .close-menu {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .menu-item {
      padding: 12px 15px;
      margin: 8px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-item:hover {
      background: var(--bg-tertiary);
      transform: translateX(5px);
    }

    /* Search Bar */
    .search-container {
      max-width: 600px;
      margin: 0 auto 20px;
      padding: 0 15px;
    }

    #search {
      width: 100%;
      padding: 14px 20px;
      border-radius: 50px;
      border: none;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 1rem;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }

    #search:focus {
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-blue);
    }

    /* Category Buttons */
    .categories {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px 0;
      padding: 0 15px;
    }

    .category-btn {
      padding: 10px 20px;
      border-radius: 50px;
      border: none;
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
    }

    .category-btn.active {
      background: var(--accent-blue);
      color: white;
      transform: scale(1.05);
    }

    .category-btn:hover {
      transform: translateY(-2px);
      background: var(--accent-blue);
      color: white;
    }

    /* Refresh Button */
    .refresh-btn {
      display: block;
      margin: 20px auto;
      padding: 12px 30px;
      background: linear-gradient(135deg, var(--accent-blue), #8b5cf6);
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: var(--transition);
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    /* News Cards */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: var(--bg-secondary);
      border-radius: 16px;
      overflow: hidden;
      transition: var(--transition);
      animation: fadeInUp 0.5s ease;
      box-shadow: var(--shadow);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.4);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: var(--transition);
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card-content {
      padding: 20px;
    }

    .card h3 {
      margin: 10px 0;
      font-size: 1.2rem;
    }

    .card a {
      color: var(--accent-blue);
      text-decoration: none;
      transition: var(--transition);
    }

    .card a:hover {
      color: #3b82f6;
      text-decoration: underline;
    }

    .source {
      display: inline-block;
      padding: 4px 12px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--accent-green);
      margin: 10px 0;
    }

    .save-btn {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
    }

    .save-btn:hover {
      background: var(--accent-blue);
      color: white;
    }

    .date {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 10px;
    }

    /* Loading Animation */
    .loading {
      text-align: center;
      padding: 40px;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--accent-green);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
      box-shadow: var(--shadow);
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Footer */
    footer {
      margin-top: 50px;
      padding: 30px 20px;
      text-align: center;
      background: var(--bg-secondary);
      border-top: 1px solid var(--bg-tertiary);
    }

    footer a {
      color: var(--accent-blue);
      text-decoration: none;
      margin: 0 12px;
      transition: var(--transition);
    }

    footer a:hover {
      color: #3b82f6;
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .news-grid {
        grid-template-columns: 1fr;
        padding: 15px;
      }
      
      .topbar {
        padding: 10px 15px;
      }
      
      .category-btn {
        padding: 8px 16px;
        font-size: 0.9rem;
      }
    }

    /* Premium Section */
    .premium-badge {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <h1>NewsHub</h1>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>

  <div id="menu">
    <div class="menu-header">
      <h2>Menu</h2>
      <button class="close-menu" onclick="toggleMenu()">✕</button>
    </div>
    <div class="menu-item" onclick="showSection('home')">
      <span>🏠</span> Home
    </div>
    <div class="menu-item" onclick="showSection('saved')">
      <span>⭐</span> Saved News
    </div>
    <div class="menu-item" onclick="showSection('premium')">
      <span>🔥</span> Premium News
    </div>
  </div>

  <div id="homeSection">
    <div class="search-container">
      <input type="text" id="search" placeholder="🔍 Search news articles..." oninput="debouncedSearch()">
    </div>

    <div class="categories">
      <button class="category-btn active" onclick="setCategory('all')">All</button>
      <button class="category-btn" onclick="setCategory('india')">🇮🇳 India</button>
      <button class="category-btn" onclick="setCategory('defence')">⚔️ Defence</button>
      <button class="category-btn" onclick="setCategory('world')">🌍 World</button>
      <button class="category-btn" onclick="setCategory('technology')">💻 Tech</button>
      <button class="category-btn" onclick="setCategory('sports')">⚽ Sports</button>
    </div>

    <button class="refresh-btn" onclick="fetchNews()">🔄 Refresh News</button>
    <p id="last" style="text-align: center; font-size: 0.8rem;"></p>

    <div id="news" class="news-grid">Loading...</div>
  </div>

  <div id="savedSection" style="display:none;">
    <h2 style="text-align: center; margin: 30px 0;">⭐ Your Saved News</h2>
    <div id="saved" class="news-grid"></div>
  </div>

  <div id="premiumSection" style="display:none;">
    <h2 style="text-align: center; margin: 30px 0;">🔥 Premium News</h2>
    <div id="premium" class="news-grid"></div>
  </div>

  <footer>
    <hr style="border-color: var(--bg-tertiary); margin-bottom: 20px;">
    <p>
      <a href="privacy.html">Privacy Policy</a> |
      <a href="about.html">About Us</a> |
      <a href="contact.html">Contact</a>
    </p>
    <p style="margin-top: 15px;">© 2024 NewsHub - Stay Informed</p>
  </footer>

  <script src="script.js?v=2"></script>
</body>
</html>
